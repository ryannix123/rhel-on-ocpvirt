---
# tekton/pipelinerun-example.yaml
# Trigger a build for one RHEL version. Run one per version, or wire these
# into a trigger / loop. Apply with: oc create -f tekton/pipelinerun-example.yaml
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: rhel-image-run-
spec:
  pipelineRef:
    name: rhel-image-pipeline
  params:
    - name: rhel-version
      value: "9.6"
    - name: arch
      value: "x86_64"
    - name: quay-repo
      value: "quay.io/ryan_nix/rhel-containerdisk"
    - name: git-url
      value: "https://github.com/ryannix123/rhel-image-builder.git"
    - name: git-revision
      value: "main"
    - name: push-raw-artifact
      value: "true"
  workspaces:
    - name: shared
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 30Gi
    - name: quay-auth
      secret:
        secretName: quay-auth
