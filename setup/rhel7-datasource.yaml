---
# One-time cluster setup (requires admin): makes the uploaded RHEL 7.9
# base image available cluster-wide, exactly like the built-in rhel8/9/10
# boot sources. Upload first (see README), then apply this.
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataSource
metadata:
  name: rhel7
  namespace: openshift-virtualization-os-images
spec:
  source:
    pvc:
      name: rhel7-base
      namespace: openshift-virtualization-os-images
