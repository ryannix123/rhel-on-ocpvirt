---
# build-images.yml
#
# Builds qcow2 images for RHEL 8, 9, and 10 using the osbuild-based
# `image-builder` CLI, then stages them for upload to Proxmox.
#
# Run this ON a registered RHEL 9.x or 10.x host (the build host). The
# image-builder CLI requires a recent RHEL host and an active subscription.
#
# Usage:
#   ansible-playbook build-images.yml
#   ansible-playbook build-images.yml -e 'target_versions=["9.6","10.2"]'
#   ansible-playbook build-images.yml -e org_id=XXXX -e activation_key=YYYY
#
# NOTE ON RHEL 7: the modern image-builder CLI cannot build RHEL 7 images.
# RHEL 7 reached end of Maintenance Support in June 2024 (ELS only). See the
# note at the bottom of this file for how to source a RHEL 7 qcow2 instead.

- name: Build RHEL qcow2 images with image-builder
  hosts: build_host
  become: true

  vars:
    # Versions to build. Each must have a matching repos/rhel-<ver>.json and
    # blueprints/rhel-<ver>.toml (the playbook templates these if missing).
    #
    # The builder can only build versions its subscription entitles. A RHEL 10
    # host entitles RHEL 10 content; RHEL 8/9 EUS require a host whose
    # subscription includes those repos (check: subscription-manager repos
    # --list | grep rhel-8). 8.10 is omitted here because it needs a
    # RHEL 8-entitled builder; add it back when building on such a host.
    target_versions:
      - "9.6"
      - "10.2"

    arch: "x86_64"

    # Subscription details baked into the firstboot service. Override on the
    # CLI or via vault. Leave empty to skip firstboot registration.
    org_id: ""
    activation_key: ""

    # SSH public key injected into the 'admin' user. No password is set —
    # the image is key-auth only. Resolution order:
    #   1. admin_ssh_key passed on the CLI (-e admin_ssh_key="ssh-ed25519 ...")
    #   2. the file at admin_ssh_key_file (defaults to your ed25519 pubkey)
    # The playbook reads the file at runtime so you don't paste keys around.
    admin_ssh_key: ""
    admin_ssh_key_file: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519.pub"

    work_dir: "/var/lib/image-builder-workspace"
    # Where finished images get copied. Mount/scp this to Proxmox after.
    output_dir: "/var/lib/image-builder-workspace/output"

  tasks:
    - name: Ensure host is RHEL 9 or 10
      ansible.builtin.assert:
        that:
          - ansible_distribution == "RedHat"
          - ansible_distribution_major_version | int >= 9
        fail_msg: >-
          image-builder CLI requires a RHEL 9.x or 10.x build host.
          This host is {{ ansible_distribution }} {{ ansible_distribution_version }}.

    - name: Resolve admin SSH public key
      when: admin_ssh_key | length == 0
      block:
        - name: Read SSH public key from file
          ansible.builtin.slurp:
            src: "{{ admin_ssh_key_file }}"
          register: _ssh_key_raw
          delegate_to: localhost
          become: false

        - name: Set admin_ssh_key fact from file
          ansible.builtin.set_fact:
            admin_ssh_key: "{{ (_ssh_key_raw.content | b64decode).strip() }}"
      rescue:
        - name: Fail with a clear message when no key is available
          ansible.builtin.fail:
            msg: >-
              No SSH public key found. Either pass one directly with
              -e admin_ssh_key="ssh-ed25519 AAAA..." or point admin_ssh_key_file
              at an existing public key (looked for {{ admin_ssh_key_file }}).
              Generate one with: ssh-keygen -t ed25519

    - name: Validate the resolved key looks like an SSH public key
      ansible.builtin.assert:
        that:
          - admin_ssh_key is match('^(ssh-(ed25519|rsa)|ecdsa-)')
        fail_msg: >-
          admin_ssh_key does not look like a valid SSH public key:
          '{{ admin_ssh_key | truncate(40) }}'

    - name: Install image-builder and qemu tooling
      ansible.builtin.dnf:
        name:
          - image-builder
          - qemu-img
        state: present

    - name: Create workspace directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ work_dir }}/repos"
        - "{{ work_dir }}/blueprints"
        - "{{ output_dir }}"

    - name: Stage repo definitions for each version
      ansible.builtin.template:
        src: "templates/rhel-repos.json.j2"
        dest: "{{ work_dir }}/repos/rhel-{{ item }}.json"
        mode: "0644"
      loop: "{{ target_versions }}"
      vars:
        rhel_version: "{{ item }}"

    - name: Stage blueprints for each version
      ansible.builtin.template:
        src: "templates/blueprint.toml.j2"
        dest: "{{ work_dir }}/blueprints/rhel-{{ item }}.toml"
        mode: "0644"
      loop: "{{ target_versions }}"
      vars:
        rhel_version: "{{ item }}"

    - name: Build each qcow2 image
      ansible.builtin.command:
        cmd: >-
          image-builder build qcow2
          --distro rhel-{{ item }}
          --force-repo-dir {{ work_dir }}/repos/
          --blueprint={{ work_dir }}/blueprints/rhel-{{ item }}.toml
        chdir: "{{ work_dir }}"
        creates: "{{ work_dir }}/rhel-{{ item }}-qcow2-{{ arch }}/rhel-{{ item }}-qcow2-{{ arch }}.qcow2"
      loop: "{{ target_versions }}"
      register: build_results
      # Image builds are slow; bump if you hit timeouts.
      async: 3600
      poll: 30

    - name: Copy finished images to output dir
      ansible.builtin.copy:
        src: "{{ work_dir }}/rhel-{{ item }}-qcow2-{{ arch }}/rhel-{{ item }}-qcow2-{{ arch }}.qcow2"
        dest: "{{ output_dir }}/rhel-{{ item }}-{{ arch }}.qcow2"
        remote_src: true
        mode: "0644"
        owner: "{{ ansible_env.SUDO_USER | default('root') }}"
      loop: "{{ target_versions }}"

    - name: Summary
      ansible.builtin.debug:
        msg: >-
          Build complete. Images in {{ output_dir }}:
          {{ target_versions | map('regex_replace', '^(.*)$', 'rhel-\1-' + arch + '.qcow2') | list }}.
          Login: user 'admin' via SSH key auth (no password). Connect with the
          private key matching the injected public key, e.g.
          'ssh admin@<vm-ip>'. The 'admin' user has passwordless sudo via wheel.

# ---------------------------------------------------------------------------
# RHEL 7 IMAGES
# ---------------------------------------------------------------------------
# The image-builder CLI shown here cannot target rhel-7.x. Options:
#   1. Download the official RHEL 7 KVM Guest Image (qcow2) from
#      access.redhat.com (Downloads > RHEL 7 > "Red Hat Enterprise Linux 7.9
#      KVM Guest Image") and import that directly into Proxmox.
#   2. If you need a *customized* RHEL 7 image, use the legacy
#      lorax-composer / composer-cli on a RHEL 7 host (osbuild-composer is
#      RHEL 8+). That is a separate workflow from this playbook.
# Given RHEL 7 is ELS-only, option 1 is almost always the right call.
# ---------------------------------------------------------------------------
