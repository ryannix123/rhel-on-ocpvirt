<svg width="1240" height="400" viewBox="0 0 1240 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RHEL Image Builder: one build, three destinations, governed by Satellite">
  <defs>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1f24"/>
      <stop offset="1" stop-color="#0f1216"/>
    </linearGradient>
    <linearGradient id="redwash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ee0000"/>
      <stop offset="1" stop-color="#b30000"/>
    </linearGradient>
    <linearGradient id="flowline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ee0000" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ee0000" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .display { font-family: "Helvetica Neue", Arial, sans-serif; font-weight: 800; letter-spacing: -0.5px; }
      .label   { font-family: "Helvetica Neue", Arial, sans-serif; font-weight: 600; letter-spacing: 0.3px; }
      .mono    { font-family: "SF Mono", "DejaVu Sans Mono", monospace; font-weight: 600; }
      .eyebrow { font-family: "SF Mono", "DejaVu Sans Mono", monospace; font-weight: 600; letter-spacing: 3px; }
    </style>
  </defs>

  <rect width="1240" height="400" rx="18" fill="url(#field)"/>
  <rect x="0" y="0" width="8" height="400" fill="url(#redwash)"/>

  <text x="56" y="60" class="eyebrow" font-size="15" fill="#ee5a5a">RED HAT ENTERPRISE LINUX &#183; IMAGE PIPELINE</text>
  <text x="54" y="116" class="display" font-size="54" fill="#ffffff">RHEL Image Builder</text>
  <text x="56" y="152" class="label" font-size="19" fill="#9aa4b0">Build once. Sign it. Ship it everywhere.</text>

  <g transform="translate(0,270)">

    <g filter="url(#soft)">
      <rect x="54" y="-46" width="186" height="92" rx="12" fill="#252b32" stroke="#3a424c" stroke-width="1"/>
    </g>
    <text x="72" y="-16" class="mono" font-size="13" fill="#6f7a86">image-builder</text>
    <text x="72" y="12" class="label" font-size="18" fill="#ffffff">Build host</text>
    <text x="72" y="33" class="mono" font-size="12" fill="#9aa4b0">RHEL 9 / 10 &#183; osbuild</text>

    <path d="M240 0 L268 0" stroke="url(#flowline)" stroke-width="3" fill="none"/>

    <g transform="translate(270,0)">
      <g transform="translate(0,-39)">
        <rect x="0" y="0" width="62" height="26" rx="13" fill="#11151a" stroke="#ee0000" stroke-width="1.5"/>
        <text x="31" y="18" text-anchor="middle" class="mono" font-size="13" fill="#ffb3b3">RHEL 8</text>
      </g>
      <g transform="translate(0,-13)">
        <rect x="0" y="0" width="62" height="26" rx="13" fill="#11151a" stroke="#ee0000" stroke-width="1.5"/>
        <text x="31" y="18" text-anchor="middle" class="mono" font-size="13" fill="#ffb3b3">RHEL 9</text>
      </g>
      <g transform="translate(0,13)">
        <rect x="0" y="0" width="62" height="26" rx="13" fill="#11151a" stroke="#ee0000" stroke-width="1.5"/>
        <text x="31" y="18" text-anchor="middle" class="mono" font-size="13" fill="#ffb3b3">RHEL 10</text>
      </g>
    </g>

    <text x="346" y="9" class="mono" font-size="24" fill="#ee0000">&#8594;</text>

    <g filter="url(#soft)" transform="translate(388,0)">
      <rect x="0" y="-40" width="156" height="82" rx="12" fill="#252b32" stroke="#3a424c" stroke-width="1"/>
    </g>
    <g transform="translate(388,0)">
      <text x="22" y="-10" class="label" font-size="17" fill="#ffffff">qcow2</text>
      <text x="22" y="12" class="mono" font-size="11.5" fill="#9aa4b0">+ guest agent</text>
      <text x="22" y="29" class="mono" font-size="11.5" fill="#9aa4b0">SSH key auth</text>
    </g>

    <path d="M556 0 L612 0" stroke="url(#flowline)" stroke-width="3" fill="none"/>
    <circle cx="612" cy="0" r="5" fill="#ee0000"/>
    <path d="M612 0 C 656 0 656 -92 700 -92" stroke="url(#flowline)" stroke-width="3" fill="none"/>
    <path d="M612 0 L 700 0" stroke="url(#flowline)" stroke-width="3" fill="none"/>
    <path d="M612 0 C 656 0 656 92 700 92" stroke="url(#flowline)" stroke-width="3" fill="none"/>

    <g transform="translate(700,-92)">
      <rect x="0" y="-27" width="246" height="54" rx="12" fill="#1d2733" stroke="#2f4356" stroke-width="1"/>
      <text x="20" y="-4" class="label" font-size="16" fill="#ffffff">Quay registry</text>
      <text x="20" y="17" class="mono" font-size="11.5" fill="#7fb2e6">signed &#183; versioned &#183; OCI</text>
    </g>
    <g transform="translate(700,0)">
      <rect x="0" y="-27" width="246" height="54" rx="12" fill="#2a1d33" stroke="#4a2f56" stroke-width="1"/>
      <text x="20" y="-4" class="label" font-size="16" fill="#ffffff">OpenShift Virtualization</text>
      <text x="20" y="17" class="mono" font-size="11.5" fill="#c79be6">containerDisk &#183; DataVolume</text>
    </g>
    <g transform="translate(700,92)">
      <rect x="0" y="-27" width="246" height="54" rx="12" fill="#332a1d" stroke="#564a2f" stroke-width="1"/>
      <text x="20" y="-4" class="label" font-size="16" fill="#ffffff">Proxmox</text>
      <text x="20" y="17" class="mono" font-size="11.5" fill="#e6c79b">oras pull &#183; qm importdisk</text>
    </g>

    <line x1="980" y1="-92" x2="980" y2="92" stroke="#3a424c" stroke-width="1"/>
    <text x="1006" y="-58" class="eyebrow" font-size="12" fill="#6f7a86">GOVERNED BY</text>
    <text x="1006" y="-20" class="label" font-size="22" fill="#ee5a5a">Red Hat</text>
    <text x="1006" y="8" class="label" font-size="22" fill="#ffffff">Satellite</text>
    <text x="1006" y="44" class="mono" font-size="12" fill="#9aa4b0">patch &#183; posture</text>
    <text x="1006" y="62" class="mono" font-size="12" fill="#9aa4b0">content control</text>
  </g>
</svg>
