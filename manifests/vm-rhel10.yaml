---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: rhel10-01
  labels:
    app: rhel-fleet
    os: rhel10
spec:
  runStrategy: Always
  instancetype:
    name: u1.small # 1 vCPU / 2Gi; do NOT also set domain cpu/memory
  preference:
    name: rhel.10
  dataVolumeTemplates:
    - metadata:
        name: rhel10-01-rootdisk
      spec:
        sourceRef:
          kind: DataSource
          name: rhel10 # built-in auto-updating boot source
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 30Gi
  template:
    metadata:
      labels:
        app: rhel-fleet
        os: rhel10
    spec:
      domain:
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          dataVolume:
            name: rhel10-01-rootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            secretRef:
              name: cloudinit-rhel10 # created by create-registration-secrets.sh
